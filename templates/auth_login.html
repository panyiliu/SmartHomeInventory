{% extends "base.html" %}
{% block title %}登录 - 小仓屋{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card">
        <div class="card-body p-4">
          <h4 class="mb-1 fw-semibold">登录</h4>
          <div class="text-muted small mb-3">请输入你的账号密码。</div>

          <form method="post" action="{{ url_for('auth.login_post', next=request.args.get('next') or '') }}" autocomplete="off">
            <div class="mb-3">
              <label class="form-label">账号</label>
              <input class="form-control" name="username" required autocomplete="username" />
            </div>
            <div class="mb-3">
              <label class="form-label">密码</label>
              <input class="form-control" type="password" name="password" required autocomplete="current-password" />
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit"><i class="bi bi-box-arrow-in-right me-1"></i>登录</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
