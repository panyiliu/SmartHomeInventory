{% extends "base.html" %}
{% block title %}强制改密 - 小仓屋{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-lg-5">
      <div class="card">
        <div class="card-body p-4">
          <h4 class="mb-1 fw-semibold">强制改密</h4>
          <div class="text-muted small mb-3">为保障账号安全，你需要先更新密码。</div>

          <form method="post" action="{{ url_for('auth.change_password_post') }}" autocomplete="off">
            <div class="mb-3">
              <label class="form-label">新密码</label>
              <input class="form-control" type="password" name="new_password" required minlength="8" autocomplete="new-password" />
              <div class="form-text">至少 8 位，包含字母和数字（管理员/Owner 更严格）。</div>
            </div>

            <div class="mb-3">
              <label class="form-label">确认新密码</label>
              <input class="form-control" type="password" name="new_password2" required minlength="8" autocomplete="new-password" />
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-shield-lock me-1"></i>更新密码
              </button>
              <a class="btn btn-outline-secondary" href="{{ url_for('main.index') }}">
                返回首页
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
